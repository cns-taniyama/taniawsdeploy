name: Deploy

on:
  # Manual trigger from Actions tab.
  workflow_dispatch:
  # Auto deploy when main is updated.
  push:
    branches:
      - main

# Required for OIDC based AssumeRole.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # GitHub repository Variables (Settings -> Secrets and variables -> Actions)
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
      DEPLOY_BUCKET: ${{ vars.DEPLOY_BUCKET }}
      EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify caller identity
        run: aws sts get-caller-identity

      - name: Validate required variables
        run: |
          test -n "${DEPLOY_BUCKET}" || (echo "Missing repository variable DEPLOY_BUCKET" && exit 1)
          test -n "${EC2_INSTANCE_ID}" || (echo "Missing repository variable EC2_INSTANCE_ID" && exit 1)

      # Build a zip artifact from repository files.
      - name: Package app artifact
        run: |
          mkdir -p build
          zip -r build/app.zip . \
            -x ".git/*" \
               ".github/*" \
               "infra/*" \
               "build/*"

      # Upload artifact to S3 so EC2 can pull it via IAM role.
      - name: Upload artifact to S3
        run: |
          ARTIFACT_KEY="releases/${GITHUB_SHA}.zip"
          aws s3 cp build/app.zip "s3://${DEPLOY_BUCKET}/${ARTIFACT_KEY}"
          echo "ARTIFACT_KEY=${ARTIFACT_KEY}" >> "${GITHUB_ENV}"

      # Execute deployment commands remotely through AWS Systems Manager.
      - name: Deploy to EC2 via SSM
        shell: bash
        run: |
          cat > /tmp/ssm-params.json <<EOF
          {
            "commands": [
              "set -e",
              "aws s3 cp s3://${DEPLOY_BUCKET}/${ARTIFACT_KEY} /tmp/taniawsdeploy.zip",
              "sudo rm -rf /var/www/html/*",
              "sudo unzip -oq /tmp/taniawsdeploy.zip -d /var/www/html",
              "sudo chown -R apache:apache /var/www/html",
              "sudo systemctl restart httpd"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${GITHUB_SHA}" \
            --parameters file:///tmp/ssm-params.json \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command id: ${COMMAND_ID}"

          if ! aws ssm wait command-executed --command-id "${COMMAND_ID}" --instance-id "${EC2_INSTANCE_ID}"; then
            aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${EC2_INSTANCE_ID}" \
              --output json || true
            exit 1
          fi

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "{status:StatusDetails,stdout:StandardOutputContent,stderr:StandardErrorContent}" \
            --output json
